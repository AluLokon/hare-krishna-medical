<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Hare Krishna Medical Store</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; }

    /* Login Screen */
    .login-screen {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
    }
    .login-box {
      background: white; padding: 2rem; border-radius: 16px;
      width: min(380px, 94vw); box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    .login-box h1 { font-size: 22px; margin-bottom: 0.25rem; }
    .login-box p { color: #777; font-size: 13px; margin-bottom: 1.5rem; }
    .login-box input {
      width: 100%; padding: 0.65rem 0.85rem; border-radius: 8px;
      border: 1px solid #ddd; font-size: 14px;
      font-family: inherit; margin-bottom: 10px;
    }
    .login-box button {
      width: 100%; padding: 0.75rem; background: #3B6D11;
      color: white; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 500; cursor: pointer;
      font-family: inherit;
    }
    .login-error { color: #A32D2D; font-size: 13px; margin-top: 8px; }

    /* Admin Dashboard */
    .dashboard { display: none; }
    header {
      background: linear-gradient(135deg, #085041, #1D9E75);
      color: white; padding: 1rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 18px; }
    header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
    .logout-btn {
      background: rgba(255,255,255,0.2); color: white;
      border: none; padding: 6px 14px; border-radius: 8px;
      font-size: 13px; cursor: pointer; font-family: inherit;
    }

    /* Stats */
    .stats {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px; padding: 1rem; max-width: 900px; margin: 0 auto;
    }
    .stat-card {
      background: white; border-radius: 12px;
      padding: 1rem; border: 1px solid #e8e8e8;
    }
    .stat-label { font-size: 12px; color: #777; }
    .stat-value { font-size: 24px; font-weight: 600; color: #3B6D11; margin-top: 4px; }

    /* Orders */
    .orders-section { padding: 0 1rem 2rem; max-width: 900px; margin: 0 auto; }
    .orders-header {
      display: flex; align-items: center; justify-content: space-between;
      margin: 1rem 0 0.75rem;
    }
    .orders-header h2 { font-size: 16px; font-weight: 500; }
    .refresh-btn {
      background: #EAF3DE; color: #3B6D11; border: 1px solid #C0DD97;
      padding: 5px 14px; border-radius: 8px; font-size: 13px;
      cursor: pointer; font-family: inherit;
    }

    .order-card {
      background: white; border: 1px solid #e8e8e8;
      border-radius: 12px; padding: 1rem; margin-bottom: 10px;
    }
    .order-card.delivered { border-color: #C0DD97; background: #f9fdf4; }

    .order-top {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 8px;
    }
    .order-id { font-size: 12px; color: #777; }
    .order-name { font-size: 15px; font-weight: 500; margin-top: 2px; }
    .order-phone { font-size: 13px; color: #555; margin-top: 2px; }
    .order-time { font-size: 12px; color: #777; text-align: right; }
    .order-status {
      font-size: 11px; padding: 3px 8px; border-radius: 20px;
      font-weight: 500; margin-top: 4px; display: inline-block;
    }
    .status-pending { background: #FAEEDA; color: #633806; }
    .status-delivered { background: #EAF3DE; color: #27500A; }

    .order-items {
      background: #f9f9f7; border-radius: 8px;
      padding: 8px 10px; margin: 8px 0; font-size: 13px;
    }
    .order-item-row { padding: 3px 0; color: #444; }
    .order-address { font-size: 13px; color: #555; margin: 6px 0; }

    .order-bottom {
      display: flex; align-items: center;
      justify-content: space-between; margin-top: 10px;
    }
    .order-total { font-size: 16px; font-weight: 600; color: #3B6D11; }

    .deliver-btn {
      background: #3B6D11; color: white; border: none;
      padding: 7px 16px; border-radius: 8px; font-size: 13px;
      cursor: pointer; font-family: inherit;
    }
    .deliver-btn:disabled {
      background: #C0DD97; color: #27500A; cursor: default;
    }

    .no-orders { text-align: center; color: #888; padding: 3rem; font-size: 14px; }
    .auto-refresh { font-size: 12px; color: #777; text-align: center; padding: 0.5rem; }


    .form-label { font-size: 12px; color: #555; display:block; margin-bottom:4px; }
    .form-input {
      width: 100%; padding: 0.5rem 0.75rem; border-radius: 8px;
      border: 1px solid #ddd; font-size: 14px; font-family: inherit;
      background: white;
    }
    .med-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid #eee; gap: 8px; flex-wrap: wrap;
    }
    .med-name { font-size: 14px; font-weight: 500; flex: 1; min-width: 120px; }
    .med-brand { font-size: 12px; color: #777; }
    .med-controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .med-input {
      width: 70px; padding: 4px 8px; border-radius: 6px;
      border: 1px solid #ddd; font-size: 13px; font-family: inherit;
    }
    .update-btn {
      background: #EAF3DE; color: #3B6D11; border: 1px solid #C0DD97;
      padding: 4px 10px; border-radius: 6px; font-size: 12px;
      cursor: pointer; font-family: inherit;
    }
    .delete-btn {
      background: #FCEBEB; color: #A32D2D; border: 1px solid #F7C1C1;
      padding: 4px 10px; border-radius: 6px; font-size: 12px;
      cursor: pointer; font-family: inherit;
    }
    .stock-zero { color: #A32D2D; font-weight: 500; }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <div style="font-size:40px;margin-bottom:0.75rem">🏥</div>
      <h1>Admin Login</h1>
      <p>Hare Krishna Medical Store</p>
      <input type="password" id="passwordInput"
        placeholder="Enter admin password"
        onkeydown="if(event.key==='Enter') login()">
      <button onclick="login()">Login</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- DASHBOARD (shown after login) -->
  <div class="dashboard" id="dashboard">

    <header>
      <div>
        <h1>🏥 Admin Dashboard</h1>
        <p>Hare Krishna Medical Store</p>
      </div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </header>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total Orders</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-value" id="statPending" style="color:#BA7517">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Delivered</div>
        <div class="stat-value" id="statDelivered">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Today's Revenue</div>
        <div class="stat-value" id="statRevenue">₹0</div>
      </div>
    </div>

    <!-- Orders List -->
    <div class="orders-section">
      <div class="orders-header">
        <h2>All Orders (newest first)</h2>
        <button class="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
      </div>
      <div id="ordersList"></div>
      <div class="auto-refresh" id="refreshTimer"></div>
    </div>

    <!-- Medicines Manager -->
    <div class="orders-section" style="margin-top:2rem">
      <div class="orders-header">
        <h2>Medicines Manager</h2>
        <button class="refresh-btn" onclick="loadMedicines()">↻ Refresh</button>
      </div>

      <!-- Add New Medicine Form -->
      <div class="order-card" style="margin-bottom:1rem">
        <div style="font-size:15px;font-weight:500;margin-bottom:1rem">➕ Add New Medicine</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div>
            <label class="form-label">Medicine Name *</label>
            <input type="text" id="newName" placeholder="e.g. Dolo 650mg" class="form-input">
          </div>
          <div>
            <label class="form-label">Brand</label>
            <input type="text" id="newBrand" placeholder="e.g. Micro Labs" class="form-input">
          </div>
          <div>
            <label class="form-label">Price (₹) *</label>
            <input type="number" id="newPrice" placeholder="e.g. 30" class="form-input">
          </div>
          <div>
            <label class="form-label">Stock *</label>
            <input type="number" id="newStock" placeholder="e.g. 100" class="form-input">
          </div>
          <div>
            <label class="form-label">Category *</label>
            <select id="newCategory" class="form-input">
              <option value="fever">Fever & Cold</option>
              <option value="vitamins">Vitamins</option>
              <option value="pain">Pain Relief</option>
              <option value="stomach">Stomach</option>
              <option value="diabetes">Diabetes</option>
              <option value="skincare">Skin Care</option>
            </select>
          </div>
          <div>
            <label class="form-label">Icon (emoji)</label>
            <input type="text" id="newIcon" placeholder="💊" class="form-input">
          </div>
        </div>
        <div style="margin-top:10px;display:flex;align-items:center;gap:10px">
          <input type="checkbox" id="newRx">
          <label for="newRx" style="font-size:13px">Requires Prescription (Rx)</label>
        </div>
        <button class="deliver-btn" style="margin-top:1rem;width:100%;padding:0.75rem"
          onclick="addMedicine()">Add Medicine</button>
      </div>

      <!-- Medicines List -->
      <div id="medicinesList"></div>
    </div>

  </div>

  <script>
    // ── Simple password protection ──
    // Change 'admin123' to whatever password you want
    const ADMIN_PASSWORD = 'admin123';

    function login() {
      const input = document.getElementById('passwordInput').value;
      if (input === ADMIN_PASSWORD) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadOrders();
        loadMedicines();
        startAutoRefresh();
        
      } else {
        document.getElementById('loginError').textContent = 'Wrong password. Try again.';
      }
    }

    function logout() {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('passwordInput').value = '';
    }

    // ── Load all orders from database ──
    async function loadOrders() {
      try {
        const res = await fetch('/api/orders');
        const orders = await res.json();
        renderOrders(orders);
        updateStats(orders);
      } catch (err) {
        document.getElementById('ordersList').innerHTML =
          '<p style="color:red;padding:1rem">Failed to load orders.</p>';
      }
    }

    // ── Show orders on screen ──
    function renderOrders(orders) {
      const list = document.getElementById('ordersList');

      if (!orders.length) {
        list.innerHTML = '<div class="no-orders">📭 No orders yet.<br>They will appear here when customers order.</div>';
        return;
      }

      list.innerHTML = orders.map(order => {
        const items = Array.isArray(order.items) ? order.items : JSON.parse(order.items || '[]');
        const time = new Date(order.created_at).toLocaleString('en-IN', {
          day: '2-digit', month: 'short',
          hour: '2-digit', minute: '2-digit', hour12: true
        });
        const delivered = order.status === 'delivered';

        return `
          <div class="order-card ${delivered ? 'delivered' : ''}" id="order-${order.id}">
            <div class="order-top">
              <div>
                <div class="order-id">Order #${order.id}</div>
                <div class="order-name">${order.customer_name}</div>
                <div class="order-phone">📞 ${order.phone}</div>
              </div>
              <div>
                <div class="order-time">${time}</div>
                <span class="order-status ${delivered ? 'status-delivered' : 'status-pending'}">
                  ${delivered ? '✓ Delivered' : '⏳ Pending'}
                </span>
              </div>
            </div>

            <div class="order-items">
              ${items.map(i => `
                <div class="order-item-row">
                  💊 ${i.name} × ${i.qty} = ₹${(i.qty * i.price).toFixed(2)}
                </div>`).join('')}
            </div>

            ${order.address ? `<div class="order-address">📍 ${order.address}</div>` : ''}

            <div class="order-bottom">
              <div class="order-total">Total: ₹${parseFloat(order.total).toFixed(2)}</div>
              <button
                class="deliver-btn"
                onclick="markDelivered(${order.id})"
                ${delivered ? 'disabled' : ''}>
                ${delivered ? 'Delivered ✓' : 'Mark Delivered'}
              </button>
            </div>
          </div>`;
      }).join('');
    }

    // ── Update stat numbers at top ──
    function updateStats(orders) {
      const today = new Date().toDateString();
      const pending = orders.filter(o => o.status !== 'delivered').length;
      const delivered = orders.filter(o => o.status === 'delivered').length;
      const todayRevenue = orders
        .filter(o => new Date(o.created_at).toDateString() === today)
        .reduce((sum, o) => sum + parseFloat(o.total), 0);

      document.getElementById('statTotal').textContent = orders.length;
      document.getElementById('statPending').textContent = pending;
      document.getElementById('statDelivered').textContent = delivered;
      document.getElementById('statRevenue').textContent = '₹' + todayRevenue.toFixed(0);
    }

    // ── Mark order as delivered ──
    async function markDelivered(id) {
      try {
        await fetch(`/api/orders/${id}/deliver`, { method: 'PATCH' });
        loadOrders();
      } catch (err) {
        alert('Failed to update order.');
      }
    }

    // ── Auto refresh every 30 seconds ──
    let countdown = 30;
    function startAutoRefresh() {
      setInterval(() => {
        countdown--;
        document.getElementById('refreshTimer').textContent =
          `Auto-refreshing in ${countdown}s`;
        if (countdown <= 0) {
          countdown = 30;
          loadOrders();
        }
      }, 1000);
    }


    // ── Medicines Manager ──
    let allMedsList = [];

    async function loadMedicines() {
      try {
        const res = await fetch('/api/medicines');
        allMedsList = await res.json();
        renderMedicinesList();
      } catch (err) {
        document.getElementById('medicinesList').innerHTML =
          '<p style="color:red">Failed to load medicines.</p>';
      }
    }

    function renderMedicinesList() {
      const list = document.getElementById('medicinesList');
      if (!allMedsList.length) {
        list.innerHTML = '<p style="color:#888;font-size:14px;">No medicines yet.</p>';
        return;
      }
      list.innerHTML = allMedsList.map(m => `
        <div class="med-row">
          <div style="flex:1;min-width:120px">
            <div class="med-name">${m.icon} ${m.name}</div>
            <div class="med-brand">${m.brand} · ${m.category}</div>
          </div>
          <div class="med-controls">
            <div>
              <div style="font-size:11px;color:#777;margin-bottom:2px">Price ₹</div>
              <input type="number" class="med-input" id="price-${m.id}" value="${m.price}">
            </div>
            <div>
              <div style="font-size:11px;color:#777;margin-bottom:2px">Stock</div>
              <input type="number" class="med-input" id="stock-${m.id}"
                value="${m.stock}"
                class="${m.stock === 0 ? 'stock-zero' : ''}">
            </div>
            <div style="display:flex;flex-direction:column;gap:4px;margin-top:14px">
              <button class="update-btn" onclick="updateMedicine(${m.id})">Update</button>
              <button class="delete-btn" onclick="deleteMedicine(${m.id}, '${m.name}')">Delete</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    async function addMedicine() {
      const name     = document.getElementById('newName').value.trim();
      const brand    = document.getElementById('newBrand').value.trim();
      const price    = document.getElementById('newPrice').value;
      const stock    = document.getElementById('newStock').value;
      const category = document.getElementById('newCategory').value;
      const icon     = document.getElementById('newIcon').value.trim() || '💊';
      const requires_rx = document.getElementById('newRx').checked;

      if (!name || !price || !stock) {
        alert('Please fill Name, Price and Stock fields.');
        return;
      }

      try {
        await fetch('/api/medicines', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, brand, price, stock, category, icon, requires_rx })
        });
        // Clear form
        document.getElementById('newName').value = '';
        document.getElementById('newBrand').value = '';
        document.getElementById('newPrice').value = '';
        document.getElementById('newStock').value = '';
        document.getElementById('newIcon').value = '';
        document.getElementById('newRx').checked = false;
        alert('Medicine added successfully!');
        loadMedicines();
      } catch (err) {
        alert('Failed to add medicine.');
      }
    }

    async function updateMedicine(id) {
      const price = document.getElementById(`price-${id}`).value;
      const stock = document.getElementById(`stock-${id}`).value;
      try {
        await fetch(`/api/medicines/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ price: parseFloat(price), stock: parseInt(stock) })
        });
        alert('Updated successfully!');
        loadMedicines();
      } catch (err) {
        alert('Failed to update.');
      }
    }

    async function deleteMedicine(id, name) {
      if (!confirm(`Are you sure you want to delete "${name}"?`)) return;
      try {
        await fetch(`/api/medicines/${id}`, { method: 'DELETE' });
        loadMedicines();
      } catch (err) {
        alert('Failed to delete.');
      }
    }
  </script>

</body>
</html>
