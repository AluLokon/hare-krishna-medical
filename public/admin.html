<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Sitaram Medical Store</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; }

    /* Login Screen */
    .login-screen {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
    }
    .login-box {
      background: white; padding: 2rem; border-radius: 16px;
      width: min(380px, 94vw); box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    .login-box h1 { font-size: 22px; margin-bottom: 0.25rem; }
    .login-box p { color: #777; font-size: 13px; margin-bottom: 1.5rem; }
    .login-box input {
      width: 100%; padding: 0.65rem 0.85rem; border-radius: 8px;
      border: 1px solid #ddd; font-size: 14px;
      font-family: inherit; margin-bottom: 10px;
    }
    .login-box button {
      width: 100%; padding: 0.75rem; background: #3B6D11;
      color: white; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 500; cursor: pointer;
      font-family: inherit;
    }
    .login-box button:hover { background: #2d5509; }
    .login-error { color: #A32D2D; font-size: 13px; margin-top: 8px; }

    /* Dashboard */
    .dashboard { display: none; }
    header {
      background: linear-gradient(135deg, #085041, #1D9E75);
      color: white; padding: 1rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 18px; }
    header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
    .logout-btn {
      background: rgba(255,255,255,0.2); color: white;
      border: none; padding: 6px 14px; border-radius: 8px;
      font-size: 13px; cursor: pointer; font-family: inherit;
    }

    /* Stats */
    .stats {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px; padding: 1rem; max-width: 900px; margin: 0 auto;
    }
    .stat-card {
      background: white; border-radius: 12px;
      padding: 1rem; border: 1px solid #e8e8e8;
    }
    .stat-label { font-size: 12px; color: #777; }
    .stat-value { font-size: 24px; font-weight: 600; color: #3B6D11; margin-top: 4px; }

    /* Orders */
    .orders-section { padding: 0 1rem 2rem; max-width: 900px; margin: 0 auto; }
    .orders-header {
      display: flex; align-items: center; justify-content: space-between;
      margin: 1rem 0 0.75rem; flex-wrap: wrap; gap: 8px;
    }
    .orders-header h2 { font-size: 16px; font-weight: 500; }
    .refresh-btn {
      background: #EAF3DE; color: #3B6D11; border: 1px solid #C0DD97;
      padding: 5px 14px; border-radius: 8px; font-size: 13px;
      cursor: pointer; font-family: inherit;
    }

    .order-card {
      background: white; border: 1px solid #e8e8e8;
      border-radius: 12px; padding: 1rem; margin-bottom: 10px;
    }
    .order-card.delivered { border-color: #C0DD97; background: #f9fdf4; }
    .order-top {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 8px;
    }
    .order-id { font-size: 12px; color: #777; }
    .order-name { font-size: 15px; font-weight: 500; margin-top: 2px; }
    .order-phone { font-size: 13px; color: #555; margin-top: 2px; }
    .order-time { font-size: 12px; color: #777; text-align: right; }
    .order-status {
      font-size: 11px; padding: 3px 8px; border-radius: 20px;
      font-weight: 500; margin-top: 4px; display: inline-block;
    }
    .status-pending { background: #FAEEDA; color: #633806; }
    .status-delivered { background: #EAF3DE; color: #27500A; }
    .order-items {
      background: #f9f9f7; border-radius: 8px;
      padding: 8px 10px; margin: 8px 0; font-size: 13px;
    }
    .order-item-row { padding: 3px 0; color: #444; }
    .order-address { font-size: 13px; color: #555; margin: 6px 0; }
    .order-bottom {
      display: flex; align-items: center;
      justify-content: space-between; margin-top: 10px; gap: 8px; flex-wrap: wrap;
    }
    .order-total { font-size: 16px; font-weight: 600; color: #3B6D11; }
    .deliver-btn {
      background: #3B6D11; color: white; border: none;
      padding: 7px 16px; border-radius: 8px; font-size: 13px;
      cursor: pointer; font-family: inherit;
    }
    .deliver-btn:disabled { background: #C0DD97; color: #27500A; cursor: default; }
    .rx-img-btn {
      background: #FAEEDA; color: #633806; border: 1px solid #FAC775;
      padding: 7px 14px; border-radius: 8px; font-size: 13px;
      cursor: pointer; font-family: inherit;
    }
    .no-orders { text-align: center; color: #888; padding: 3rem; font-size: 14px; }
    .auto-refresh { font-size: 12px; color: #777; text-align: center; padding: 0.5rem; }

    /* Medicines Manager */
    .form-label { font-size: 12px; color: #555; display: block; margin-bottom: 4px; }
    .form-input {
      width: 100%; padding: 0.5rem 0.75rem; border-radius: 8px;
      border: 1px solid #ddd; font-size: 14px; font-family: inherit; background: white;
    }
    .med-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid #eee; gap: 8px; flex-wrap: wrap;
    }
    .med-name { font-size: 14px; font-weight: 500; flex: 1; min-width: 120px; }
    .med-brand { font-size: 12px; color: #777; }
    .med-controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .med-input {
      width: 70px; padding: 4px 8px; border-radius: 6px;
      border: 1px solid #ddd; font-size: 13px; font-family: inherit;
    }
    .update-btn {
      background: #EAF3DE; color: #3B6D11; border: 1px solid #C0DD97;
      padding: 4px 10px; border-radius: 6px; font-size: 12px;
      cursor: pointer; font-family: inherit;
    }
    .delete-btn {
      background: #FCEBEB; color: #A32D2D; border: 1px solid #F7C1C1;
      padding: 4px 10px; border-radius: 6px; font-size: 12px;
      cursor: pointer; font-family: inherit;
    }

    /* Prescription Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 16px;
      width: min(500px, 94vw); max-height: 85vh;
      overflow-y: auto; padding: 1.5rem;
    }
    .modal h2 { font-size: 18px; margin-bottom: 1rem; }
    .modal-close {
      float: right; background: none; border: none;
      font-size: 22px; cursor: pointer; color: #888;
    }
    .rx-image { width: 100%; border-radius: 8px; margin-top: 1rem; }


    /* Click feedback for all buttons */
button {
  transition: transform 0.1s ease, opacity 0.1s ease, background 0.15s ease;
}
button:active {
  transform: scale(0.96);
  opacity: 0.85;
}

/* Stronger feedback specifically for action buttons */
.deliver-btn:active,
.update-btn:active,
.delete-btn:active,
.refresh-btn:active,
.rx-img-btn:active,
.logout-btn:active {
  transform: scale(0.94);
}

/* Visual "selected/clicked" state that stays briefly */
.btn-clicked {
  animation: clickPulse 0.3s ease;
}
@keyframes clickPulse {
  0%   { background-color: #3B6D11; color: white; }
  100% { background-color: inherit; color: inherit; }
}
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <div style="font-size:40px;margin-bottom:0.75rem">🏥</div>
      <h1>Admin Login</h1>
      <p>Sitaram Medical Store</p>
      <input type="email" id="emailInput" placeholder="Email address"
        onkeydown="if(event.key==='Enter') login()">
      <input type="password" id="passwordInput" placeholder="Password"
        onkeydown="if(event.key==='Enter') login()">
      <button onclick="login()">Login</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <header>
      <div>
        <h1>🏥 Admin Dashboard</h1>
<p id="adminName">Sitaram Medical Store</p>
      </div>
      <div style="display:flex;gap:8px">
  <button class="logout-btn" onclick="openSettings()">⚙️ Settings</button>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>
    </header>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total Orders</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-value" id="statPending" style="color:#BA7517">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Delivered</div>
        <div class="stat-value" id="statDelivered">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Today's Revenue</div>
        <div class="stat-value" id="statRevenue">₹0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value" id="statTotalRevenue">₹0</div>
      </div>
    </div>

    <div class="orders-section">
      <div class="orders-header">
        <h2>All Orders (newest first)</h2>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <input type="date" id="dateFilter" onchange="applyDateFilter()"
            style="padding:5px 10px;border-radius:8px;border:1px solid #ddd;font-family:inherit;font-size:13px;">
          <button class="refresh-btn" onclick="clearDateFilter()">Show All</button>
          <button class="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
        </div>
      </div>
      <div id="ordersList"></div>
      <div class="auto-refresh" id="refreshTimer"></div>
    </div>

    <!-- Medicines Manager -->
    <div class="orders-section" style="margin-top:2rem">
      <div class="orders-header">
  <h2>Medicines Manager</h2>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <input type="text" id="medSearchInput" placeholder="🔍 Search medicines..."
      onkeyup="filterMedicinesList()"
      style="padding:6px 12px;border-radius:8px;border:1px solid #ddd;font-family:inherit;font-size:13px;min-width:200px">
    <button class="refresh-btn" onclick="loadMedicines()">↻ Refresh</button>
  </div>
</div>
<div id="medCountLabel" style="font-size:13px;color:#777;margin-bottom:10px"></div>

      <div class="order-card" style="margin-bottom:1rem">
        <div style="font-size:15px;font-weight:500;margin-bottom:1rem">➕ Add New Medicine</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div>
            <label class="form-label">Medicine Name *</label>
            <input type="text" id="newName" placeholder="e.g. Dolo 650mg" class="form-input">
          </div>
          <div>
            <label class="form-label">Brand</label>
            <input type="text" id="newBrand" placeholder="e.g. Micro Labs" class="form-input">
          </div>
          <div>
            <label class="form-label">Price (₹) *</label>
            <input type="number" id="newPrice" placeholder="e.g. 30" class="form-input">
          </div>
          <div>
            <label class="form-label">Stock *</label>
            <input type="number" id="newStock" placeholder="e.g. 100" class="form-input">
          </div>
          <div>
            <label class="form-label">Category *</label>
            <select id="newCategory" class="form-input">
              <option value="fever">Fever & Cold</option>
              <option value="vitamins">Vitamins</option>
              <option value="pain">Pain Relief</option>
              <option value="stomach">Stomach</option>
              <option value="diabetes">Diabetes</option>
              <option value="skincare">Skin Care</option>
              <option value="antibiotics">Antibiotics</option>
              <option value="heart">Heart & BP</option>
              <option value="respiratory">Respiratory</option>
              <option value="eye">Eye Care</option>
              <option value="general">General</option>
            </select>
          </div>
          <div>
            <label class="form-label">Icon (emoji)</label>
            <input type="text" id="newIcon" placeholder="💊" class="form-input">
          </div>
        </div>
        <div style="margin-top:10px;display:flex;align-items:center;gap:10px">
          <input type="checkbox" id="newRx">
          <label for="newRx" style="font-size:13px">Requires Prescription (Rx)</label>
          <input type="checkbox" id="newFeatured" style="margin-left:16px">
          <label for="newFeatured" style="font-size:13px">⭐ Show on Home Page</label>
        </div>
        <button class="deliver-btn" style="margin-top:1rem;width:100%;padding:0.75rem"
          onclick="addMedicine()">Add Medicine</button>
      </div>

      <div id="medicinesList"></div>
    </div>
  </div>
  <!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <button class="modal-close" onclick="closeSettings()">✕</button>
    <h2>⚙️ Account Settings</h2>

    <div style="margin-top:1rem">
      <div style="font-size:14px;font-weight:500;margin-bottom:10px">Change Password</div>
      <input type="password" id="currentPassword" placeholder="Current password" class="form-input" style="margin-bottom:8px">
      <input type="password" id="newPassword" placeholder="New password (min 6 characters)" class="form-input" style="margin-bottom:8px">
      <button class="deliver-btn" style="width:100%" onclick="changePassword()">Update Password</button>
      <div id="passwordMsg" style="font-size:13px;margin-top:8px"></div>
    </div>

    <hr style="margin:1.5rem 0;border:none;border-top:1px solid #eee">

    <div>
      <div style="font-size:14px;font-weight:500;margin-bottom:10px">Change Email</div>
      <input type="email" id="newEmail" placeholder="New email address" class="form-input" style="margin-bottom:8px">
      <input type="password" id="emailPassword" placeholder="Confirm your password" class="form-input" style="margin-bottom:8px">
      <button class="deliver-btn" style="width:100%" onclick="changeEmail()">Update Email</button>
      <div id="emailMsg" style="font-size:13px;margin-top:8px"></div>
    </div>
  </div>
</div>

  <!-- Prescription Modal -->
  <div class="modal-overlay" id="rxModal">
    <div class="modal">
      <button class="modal-close" onclick="closeRxModal()">✕</button>
      <h2>📋 Prescription</h2>
      <div id="rxContent"></div>
    </div>
  </div>

<script>
  let token = localStorage.getItem('adminToken');
  let allOrders = [];
  let allMedsList = [];

  // ── Auth ──
  async function login() {
    const email    = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const errorEl  = document.getElementById('loginError');
    errorEl.textContent = '';

    if (!email || !password) {
      errorEl.textContent = 'Please enter email and password.';
      return;
    }

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        errorEl.textContent = data.error || 'Login failed.';
        return;
      }

      token = data.token;
      localStorage.setItem('adminToken', token);
      document.getElementById('adminName').textContent =
        `Welcome, ${data.name} · Hare Krishna Medical Store`;
      showDashboard();

    } catch (err) {
      errorEl.textContent = 'Cannot connect to server.';
    }
  }

  function logout() {
    localStorage.removeItem('adminToken');
    token = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('emailInput').value = '';
    document.getElementById('passwordInput').value = '';
  }

function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';

  // Set date filter to today by default
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('dateFilter').value = today;

  loadOrders();
  loadMedicines();
  startAutoRefresh();
}

  // Helper — adds token to every API request
  function authHeaders() {
    return {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`
    };
  }

  // Check if already logged in on page load
  window.onload = function() {
    if (token) {
      showDashboard();
    }
  };

  // ── Orders ──
async function loadOrders() {
  try {
    const res = await fetch('/api/orders', { headers: authHeaders() });
    if (res.status === 401 || res.status === 403) { logout(); return; }
    allOrders = await res.json();

    // Keep date filter applied if one is selected
    const dateInput = document.getElementById('dateFilter');
    if (dateInput.value) {
      applyDateFilter();
    } else {
      renderOrders(allOrders);
      updateStats(allOrders);
    }
  } catch (err) {
    document.getElementById('ordersList').innerHTML =
      '<p style="color:red;padding:1rem">Failed to load orders.</p>';
  }
}

  function renderOrders(orders) {
    const list = document.getElementById('ordersList');
    if (!orders.length) {
      list.innerHTML = '<div class="no-orders">📭 No orders yet.</div>';
      return;
    }
    list.innerHTML = orders.map(order => {
      const items = Array.isArray(order.items) ? order.items : JSON.parse(order.items || '[]');
      const time = new Date(order.created_at).toLocaleString('en-IN', {
        day: '2-digit', month: 'short',
        hour: '2-digit', minute: '2-digit', hour12: true
      });
      const delivered = order.status === 'delivered';
      return `
        <div class="order-card ${delivered ? 'delivered' : ''}">
          <div class="order-top">
            <div>
              <div class="order-id">Order #${order.id}</div>
              <div class="order-name">${order.customer_name}</div>
              <div class="order-phone">📞 ${order.phone}</div>
            </div>
            <div>
              <div class="order-time">${time}</div>
              <span class="order-status ${delivered ? 'status-delivered' : 'status-pending'}">
                ${delivered ? '✓ Delivered' : '⏳ Pending'}
              </span>
            </div>
          </div>
          <div class="order-items">
            ${items.map(i => `
              <div class="order-item-row">
                💊 ${i.name} × ${i.qty} = ₹${(i.qty * i.price).toFixed(2)}
              </div>`).join('')}
          </div>
          ${order.address ? `<div class="order-address">📍 ${order.address}</div>` : ''}
          <div class="order-bottom">
            <div class="order-total">Total: ₹${parseFloat(order.total).toFixed(2)}</div>
            <div style="display:flex;gap:8px">
              ${order.prescription
                ? `<button class="rx-img-btn" onclick="viewPrescription('${order.id}')">📋 View Rx</button>`
                : ''}
              <button class="deliver-btn" onclick="markDelivered(${order.id})"
                ${delivered ? 'disabled' : ''}>
                ${delivered ? 'Delivered ✓' : 'Mark Delivered'}
              </button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function updateStats(orders) {
    const today = new Date().toDateString();
    const pending   = orders.filter(o => o.status !== 'delivered').length;
    const delivered = orders.filter(o => o.status === 'delivered').length;
    const todayRev  = allOrders
      .filter(o => new Date(o.created_at).toDateString() === today)
      .reduce((s, o) => s + parseFloat(o.total), 0);
    const totalRev  = allOrders.reduce((s, o) => s + parseFloat(o.total), 0);

    document.getElementById('statTotal').textContent = orders.length;
    document.getElementById('statPending').textContent = pending;
    document.getElementById('statDelivered').textContent = delivered;
    document.getElementById('statRevenue').textContent = '₹' + todayRev.toFixed(0);
    document.getElementById('statTotalRevenue').textContent = '₹' + totalRev.toFixed(0);
  }

  function applyDateFilter() {
    const val = document.getElementById('dateFilter').value;
    const selected = new Date(val).toDateString();
    const filtered = allOrders.filter(o =>
      new Date(o.created_at).toDateString() === selected);
    renderOrders(filtered);
    updateStats(filtered);
  }

  function clearDateFilter() {
    document.getElementById('dateFilter').value = '';
    renderOrders(allOrders);
    updateStats(allOrders);
    
  }

  async function markDelivered(id) {
    try {
      await fetch(`/api/orders/${id}/deliver`, {
        method: 'PATCH', headers: authHeaders()
      });
      loadOrders();
    } catch (err) { alert('Failed to update order.'); }
  }

  // View prescription image
  async function viewPrescription(orderId) {
    const order = allOrders.find(o => o.id == orderId);
    if (!order || !order.prescription) return;
    document.getElementById('rxContent').innerHTML =
      `<img src="${order.prescription}" class="rx-image" alt="Prescription">`;
    document.getElementById('rxModal').classList.add('open');
  }

  function closeRxModal() {
    document.getElementById('rxModal').classList.remove('open');
  }

  // ── Medicines Manager ──
async function loadMedicines() {
  try {
    const res = await fetch('/api/medicines');
    allMedsList = await res.json();
    showEmptySearchState();
  } catch (err) {
    document.getElementById('medicinesList').innerHTML =
      '<p style="color:red">Failed to load medicines.</p>';
  }
}

function showEmptySearchState() {
  const list = document.getElementById('medicinesList');
  const countLabel = document.getElementById('medCountLabel');
  countLabel.textContent = `${allMedsList.length} medicines total · search to view`;
  list.innerHTML = `
    <div style="text-align:center;padding:2rem;color:#888">
      <div style="font-size:32px;margin-bottom:0.5rem">🔍</div>
      <p style="font-size:14px">Type a medicine name above to search and manage it.</p>
    </div>`;
}

function renderMedicinesList(filtered) {
  const list = document.getElementById('medicinesList');
  const medsToShow = filtered || allMedsList;
  const countLabel = document.getElementById('medCountLabel');

  countLabel.textContent = `Showing ${medsToShow.length} of ${allMedsList.length} medicines`;

  if (!medsToShow.length) {
    list.innerHTML = '<p style="color:#888;font-size:14px;padding:1rem 0;">No medicines found matching your search.</p>';
    return;
  }

  list.innerHTML = medsToShow.map(m => `
    <div class="med-row">
      <div style="flex:1;min-width:120px">
        <div class="med-name">${m.icon} ${m.name}</div>
        <div class="med-brand">${m.brand} · ${m.category}
          ${m.featured ? ' · ⭐ Featured' : ''}
          ${m.requires_rx ? ' · <span style="color:#A32D2D">Rx</span>' : ''}
        </div>
      </div>
      <div class="med-controls">
        <div>
          <div style="font-size:11px;color:#777;margin-bottom:2px">Price ₹</div>
          <input type="number" class="med-input" id="price-${m.id}" value="${m.price}">
        </div>
        <div>
          <div style="font-size:11px;color:#777;margin-bottom:2px">Stock</div>
          <input type="number" class="med-input" id="stock-${m.id}" value="${m.stock}">
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;margin-top:14px">
          <button class="update-btn" onclick="updateMedicine(${m.id})">Update</button>
          <button class="delete-btn" onclick="deleteMedicine(${m.id}, '${m.name.replace(/'/g, "\\'")}')">Delete</button>
        </div>
      </div>
    </div>
  `).join('');
}

function filterMedicinesList() {
  const q = document.getElementById('medSearchInput').value.trim().toLowerCase();

  if (!q) {
    showEmptySearchState();
    return;
  }

  const filtered = allMedsList.filter(m =>
    m.name.toLowerCase().includes(q) ||
    (m.brand && m.brand.toLowerCase().includes(q)) ||
    (m.category && m.category.toLowerCase().includes(q))
  );

  renderMedicinesList(filtered);
}

  async function addMedicine() {
    const name       = document.getElementById('newName').value.trim();
    const brand      = document.getElementById('newBrand').value.trim();
    const price      = document.getElementById('newPrice').value;
    const stock      = document.getElementById('newStock').value;
    const category   = document.getElementById('newCategory').value;
    const icon       = document.getElementById('newIcon').value.trim() || '💊';
    const requires_rx = document.getElementById('newRx').checked;
    const featured   = document.getElementById('newFeatured').checked;

    if (!name || !price || !stock) {
      alert('Please fill Name, Price and Stock.');
      return;
    }

    try {
      await fetch('/api/medicines', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ name, brand, price, stock, category, icon, requires_rx, featured })
      });
      document.getElementById('newName').value = '';
      document.getElementById('newBrand').value = '';
      document.getElementById('newPrice').value = '';
      document.getElementById('newStock').value = '';
      document.getElementById('newIcon').value = '';
      document.getElementById('newRx').checked = false;
      document.getElementById('newFeatured').checked = false;
      alert('Medicine added!');
      loadMedicines();
    } catch (err) { alert('Failed to add medicine.'); }
  }

  async function updateMedicine(id) {
    const price = document.getElementById(`price-${id}`).value;
    const stock = document.getElementById(`stock-${id}`).value;
    try {
      await fetch(`/api/medicines/${id}`, {
        method: 'PATCH',
        headers: authHeaders(),
        body: JSON.stringify({ price: parseFloat(price), stock: parseInt(stock) })
      });
      alert('Updated!');
      loadMedicines();
    } catch (err) { alert('Failed to update.'); }
  }

  async function deleteMedicine(id, name) {
    if (!confirm(`Delete "${name}"?`)) return;
    try {
      await fetch(`/api/medicines/${id}`, {
        method: 'DELETE', headers: authHeaders()
      });
      loadMedicines();
    } catch (err) { alert('Failed to delete.'); }
  }

  // ── Auto refresh ──
let countdown = 30;
function startAutoRefresh() {
  setInterval(() => {
    const dateInput = document.getElementById('dateFilter');
    const timerEl = document.getElementById('refreshTimer');
    const today = new Date().toISOString().split('T')[0];

    if (dateInput.value && dateInput.value !== today) {
      // Viewing a past date — pause auto refresh
      timerEl.textContent = `📅 Showing ${dateInput.value} · Auto-refresh paused`;
      return;
    }

    countdown--;
    timerEl.textContent = `Auto-refreshing in ${countdown}s`;
    if (countdown <= 0) { countdown = 30; loadOrders(); }
  }, 1000);
}

  document.getElementById('rxModal').addEventListener('click', function(e) {
    if (e.target === this) closeRxModal();
  });

  document.getElementById('settingsModal').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});

  function openSettings() {
  document.getElementById('settingsModal').classList.add('open');
}
function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
  document.getElementById('passwordMsg').textContent = '';
  document.getElementById('emailMsg').textContent = '';
}

async function changePassword() {
  const currentPassword = document.getElementById('currentPassword').value;
  const newPassword = document.getElementById('newPassword').value;
  const msg = document.getElementById('passwordMsg');

  if (!currentPassword || !newPassword) {
    msg.style.color = '#A32D2D';
    msg.textContent = 'Please fill both fields.';
    return;
  }

  try {
    const res = await fetch('/api/auth/change-password', {
      method: 'PATCH',
      headers: authHeaders(),
      body: JSON.stringify({ currentPassword, newPassword })
    });
    const data = await res.json();

    if (!res.ok) {
      msg.style.color = '#A32D2D';
      msg.textContent = data.error;
      return;
    }

    msg.style.color = '#27500A';
    msg.textContent = '✓ Password changed successfully!';
    document.getElementById('currentPassword').value = '';
    document.getElementById('newPassword').value = '';

  } catch (err) {
    msg.style.color = '#A32D2D';
    msg.textContent = 'Something went wrong.';
  }
}

async function changeEmail() {
  const newEmail = document.getElementById('newEmail').value.trim();
  const password = document.getElementById('emailPassword').value;
  const msg = document.getElementById('emailMsg');

  if (!newEmail || !password) {
    msg.style.color = '#A32D2D';
    msg.textContent = 'Please fill both fields.';
    return;
  }

  try {
    const res = await fetch('/api/auth/change-email', {
      method: 'PATCH',
      headers: authHeaders(),
      body: JSON.stringify({ password, newEmail })
    });
    const data = await res.json();

    if (!res.ok) {
      msg.style.color = '#A32D2D';
      msg.textContent = data.error;
      return;
    }

    msg.style.color = '#27500A';
    msg.textContent = '✓ Email changed! Logging out...';
    setTimeout(() => { logout(); }, 1500);

  } catch (err) {
    msg.style.color = '#A32D2D';
    msg.textContent = 'Something went wrong.';
  }
}
